<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบสถานะ - 3D Print</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FDFBF7;
            --bg-card: #FFFFFF;
            --bg-elevated: #FDFBF7;
            --accent: #2C2C2C;
            --red: #E8453C;
            --text: #2C2C2C;
            --text2: #666666;
            --text3: #999999;
            --border: #2C2C2C;
            --border2: #555555;
            --shadow: 4px 4px 0px #2C2C2C;
            --shadow-sm: 2px 2px 0px #2C2C2C;
            --shadow-lg: 6px 6px 0px #2C2C2C;
            --font: 'Inter', -apple-system, sans-serif;
        }
        html, body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(44,44,44,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(44,44,44,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .container {
            position: relative; z-index: 1;
            max-width: 480px; margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; color: var(--text); }
        .logo span { color: var(--accent); font-weight: 900; }

        .subtitle { color: var(--text2); font-size: 0.9rem; margin-bottom: 32px; text-align: center; }

        .search-card {
            width: 100%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .search-card h2 { font-size: 1rem; margin-bottom: 16px; font-weight: 600; }

        .input-row { display: flex; gap: 8px; }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: var(--accent); }
        .input-row input::placeholder { color: var(--text3); }

        .btn-search {
            padding: 12px 24px;
            background: var(--accent);
            color: #fff;
            border: 2px solid var(--accent);
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
        }
        .btn-search:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--border); }
        .btn-search:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px var(--border); }
        .btn-search:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 10px; min-height: 20px; }

        /* Results */
        .results { width: 100%; margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }

        .order-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow);
        }
        .order-card:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-lg); }

        .order-card-top {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            margin-bottom: 10px;
        }

        .order-id { font-size: 0.75rem; color: var(--text3); font-family: monospace; }
        .order-date { font-size: 0.72rem; color: var(--text3); }

        .order-card-body { display: flex; align-items: center; gap: 12px; }

        .order-thumb {
            width: 50px; height: 50px; border-radius: 10px; overflow: hidden;
            background: var(--bg); border: 2px solid var(--border);
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-sm);
        }
        .order-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .order-thumb-ph { font-size: 1.3rem; opacity: 0.4; }

        .order-info { flex: 1; min-width: 0; }
        .order-file { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .order-meta { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }

        .order-card-bottom {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px; padding-top: 10px; border-top: 2px solid var(--border);
        }

        .order-price { font-weight: 700; font-size: 0.9rem; color: var(--accent); }

        .status-badge {
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 600;
            border: 2px solid var(--border);
        }
        .status-pending { background: #FFF8E1; color: #F57F17; }
        .status-printing { background: #E3F2FD; color: #1565C0; }
        .status-completed { background: #E8F5E9; color: #2E7D32; }

        .tracking-section {
            margin-top: 10px; padding: 10px 12px;
            background: #E3F2FD;
            border: 2px solid var(--border);
            border-radius: 10px;
        }
        .tracking-label { font-size: 0.72rem; color: var(--text2); margin-bottom: 4px; }
        .tracking-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .tracking-carrier { font-size: 0.8rem; font-weight: 600; color: var(--text); }
        .tracking-num { font-family: monospace; font-size: 0.85rem; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
        .tracking-copy {
            padding: 3px 8px; background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 6px; color: var(--accent); font-size: 0.7rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow-sm);
        }
        .tracking-copy:hover { transform: translate(-1px, -1px); box-shadow: 2px 2px 0px var(--border); }
        .tracking-link {
            padding: 3px 8px; background: #E8F5E9; border: 2px solid var(--border);
            border-radius: 6px; color: #2E7D32; font-size: 0.7rem; font-weight: 600;
            text-decoration: none; transition: all 0.15s; box-shadow: var(--shadow-sm);
        }
        .tracking-link:hover { transform: translate(-1px, -1px); box-shadow: 2px 2px 0px var(--border); }

        .no-results { text-align: center; padding: 30px 0; color: var(--text3); }
        .no-results .icon { font-size: 2rem; margin-bottom: 8px; }

        .footer-link { margin-top: 30px; font-size: 0.8rem; color: var(--text3); }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            .search-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <div class="logo">3D<span>Print</span></div>
        <p class="subtitle">ตรวจสอบสถานะงานพิมพ์ 3 มิติ</p>

        <div class="search-card">
            <h2>กรอกเบอร์โทรศัพท์เพื่อเช็คสถานะ</h2>
            <div class="input-row">
                <input type="tel" id="phoneInput" placeholder="08X-XXX-XXXX" autocomplete="tel" />
                <button class="btn-search" id="searchBtn" onclick="searchOrders()">ค้นหา</button>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="results" id="results"></div>

        <div class="footer-link">
            <a href="/">&larr; กลับไปหน้าหลัก</a>
        </div>
    </div>

    <div id="copyToast" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2C;color:#FDFBF7;padding:8px 20px;border-radius:20px;font-size:0.82rem;font-weight:600;z-index:999;border:2px solid #2C2C2C;box-shadow:2px 2px 0px #2C2C2C;">คัดลอกแล้ว!</div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getFirestore, collection, query, where, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCKJ7lQp_BBdbACF_2rYTtVcgct37gXnPo",
            authDomain: "dwebsite-95b5e.firebaseapp.com",
            projectId: "dwebsite-95b5e",
            storageBucket: "dwebsite-95b5e.firebasestorage.app",
            messagingSenderId: "171988455623",
            appId: "1:171988455623:web:517e884b8f7448cdfd6ee2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusMap = {
            pending: { label: 'รอตรวจสอบ', class: 'status-pending' },
            printing: { label: 'กำลังพิมพ์', class: 'status-printing' },
            completed: { label: 'เสร็จแล้ว', class: 'status-completed' },
        };

        function formatDate(val) {
            if (!val?.toDate) return '-';
            const d = val.toDate();
            return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function normalizeOrder(doc) {
            const d = doc.data();
            return {
                id: doc.id,
                customerName: d.customer?.name || d.customerName || '-',
                customerPhone: d.customer?.phone || d.customerPhone || '-',
                fileName: d.model?.fileName || d.fileName || '-',
                modelCount: d.model?.count || d.modelCount || 1,
                modelThumbnail: d.model?.thumbnail || d.modelThumbnail || '',
                material: d.settings?.material || '-',
                color: d.settings?.color || '-',
                quantity: d.settings?.quantity || 1,
                total: d.pricing?.total || d.price || 0,
                printTime: d.pricing?.printTime || d.printTime || '-',
                status: d.status || 'pending',
                createdAt: d.createdAt,
                trackingCarrier: d.trackingCarrier || '',
                trackingNumber: d.trackingNumber || '',
            };
        }

        function getTrackingUrl(carrier, number) {
            const n = encodeURIComponent(number);
            const urls = {
                'Flash Express': `https://www.flashexpress.com/tracking?tracking=${n}`,
                'Kerry Express': `https://th.kerryexpress.com/th/track/?track=${n}`,
                'Thailand Post': `https://track.thailandpost.co.th/?track=${n}`,
                'J&T Express': `https://www.jtexpress.co.th/tracking?billcodes=${n}`,
                'DHL': `https://www.dhl.com/th-th/home/tracking/tracking-express.html?submit=1&tracking-id=${n}`,
                'Nim Express': `https://www.nimexpress.com/tracking?track=${n}`,
            };
            return urls[carrier] || null;
        }

        function copyTracking(number) {
            navigator.clipboard.writeText(number).then(() => {
                const el = document.getElementById('copyToast');
                if (el) { el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 1500); }
            });
        }

        function renderOrders(orders) {
            const container = document.getElementById('results');
            if (orders.length === 0) {
                container.innerHTML = '<div class="no-results"><div class="icon">🔍</div><p>ไม่พบออเดอร์สำหรับเบอร์นี้</p></div>';
                return;
            }

            container.innerHTML = orders.map(o => {
                const st = statusMap[o.status] || statusMap.pending;
                const hasTracking = o.trackingNumber && o.trackingNumber.trim();
                const trackUrl = hasTracking ? getTrackingUrl(o.trackingCarrier, o.trackingNumber) : null;
                return `
                    <div class="order-card">
                        <div class="order-card-top">
                            <span class="order-id">#${o.id.slice(0, 8).toUpperCase()}</span>
                            <span class="order-date">${formatDate(o.createdAt)}</span>
                        </div>
                        <div class="order-card-body">
                            <div class="order-thumb">
                                ${o.modelThumbnail ? `<img src="${o.modelThumbnail}" alt="" />` : '<span class="order-thumb-ph">📦</span>'}
                            </div>
                            <div class="order-info">
                                <div class="order-file">${o.fileName}</div>
                                <div class="order-meta">${o.material} · ${o.quantity} ชิ้น · ${o.modelCount} ไฟล์</div>
                            </div>
                        </div>
                        ${hasTracking ? `
                        <div class="tracking-section">
                            <div class="tracking-label">📦 เลขพัสดุ</div>
                            <div class="tracking-info">
                                <span class="tracking-carrier">${o.trackingCarrier}</span>
                                <span class="tracking-num">${o.trackingNumber}</span>
                                <button class="tracking-copy" onclick="copyTracking('${o.trackingNumber}')">คัดลอก</button>
                                ${trackUrl ? `<a class="tracking-link" href="${trackUrl}" target="_blank" rel="noopener">เช็คพัสดุ</a>` : ''}
                            </div>
                        </div>
                        ` : ''}
                        <div class="order-card-bottom">
                            <span class="order-price">฿${Number(o.total).toFixed(2)}</span>
                            <span class="status-badge ${st.class}">${st.label}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.searchOrders = async function() {
            const phone = document.getElementById('phoneInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const results = document.getElementById('results');
            const btn = document.getElementById('searchBtn');

            errorMsg.textContent = '';
            results.innerHTML = '';

            if (!phone) {
                errorMsg.textContent = 'กรุณากรอกเบอร์โทรศัพท์';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'กำลังค้นหา...';

            try {
                const q = query(
                    collection(db, 'orders'),
                    where('customer.phone', '==', phone),
                    orderBy('createdAt', 'desc')
                );
                const snapshot = await getDocs(q);
                const orders = snapshot.docs.map(normalizeOrder);
                renderOrders(orders);
                if (orders.length === 0) {
                    errorMsg.textContent = 'ไม่พบออเดอร์สำหรับเบอร์นี้';
                }
            } catch (err) {
                console.error(err);
                // Fallback: try without orderBy in case index missing
                try {
                    const q2 = query(
                        collection(db, 'orders'),
                        where('customer.phone', '==', phone)
                    );
                    const snapshot2 = await getDocs(q2);
                    const orders2 = snapshot2.docs.map(normalizeOrder);
                    orders2.sort((a, b) => {
                        const ta = a.createdAt?.toDate?.() || new Date(0);
                        const tb = b.createdAt?.toDate?.() || new Date(0);
                        return tb - ta;
                    });
                    renderOrders(orders2);
                    if (orders2.length === 0) {
                        errorMsg.textContent = 'ไม่พบออเดอร์สำหรับเบอร์นี้';
                    }
                } catch (err2) {
                    errorMsg.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
                    console.error(err2);
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'ค้นหา';
            }
        };

        document.getElementById('phoneInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchOrders();
        });
    </script>
</body>
</html>
